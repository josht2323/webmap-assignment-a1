<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>My Web Map</title>

    <!-- ArcGIS API -->
    <link rel="stylesheet" href="https://js.arcgis.com/4.29/esri/themes/light/main.css" />
    <script src="https://js.arcgis.com/4.29/"></script>

    <style>
      html, body, #viewDiv {
        padding: 0;
        margin: 0;
        height: 100%;
        width: 100%;
      }
    </style>

  <script>
require([
  "esri/Map",
  "esri/views/MapView",
  "esri/widgets/Home"
], function(Map, MapView, Home) {

  const map = new Map({
    basemap: "streets"
  });

  const view = new MapView({
    container: "viewDiv",
    map: map,
    center: [-79.8, 43.3],
    zoom: 10
  });

  // Home widget
  const homeWidget = new Home({
    view: view
  });

  view.ui.add(homeWidget, "top-left");

});
</script>
  </head>

  <body>
    <div id="viewDiv"></div>
  </body>
</html>
