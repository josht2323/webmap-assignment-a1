<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Urban Planning Web Map — Burlington, ON</title>

  <!-- ArcGIS CSS -->
  <link rel="stylesheet" href="https://js.arcgis.com/4.30/esri/themes/light/main.css" />

  <style>
    html, body, #viewDiv {
      height: 100%;
      width: 100%;
      margin: 0;
      padding: 0;
    }

    #titleDiv {
      position: absolute;
      top: 10px;
      left: 60px;
      z-index: 99;
      background: white;
      padding: 12px;
      border-radius: 6px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      font-family: Arial;
    }
  </style>

  <!-- ArcGIS JS -->
  <script src="https://js.arcgis.com/4.30/"></script>

  <script>
    require([
      "esri/Map",
      "esri/views/MapView",
      "esri/widgets/Home",
      "esri/widgets/Search",
      "esri/widgets/ScaleBar",
      "esri/widgets/Sketch",
      "esri/widgets/Measurement",
      "esri/widgets/LayerList",
      "esri/layers/GraphicsLayer"
    ], function(
      Map, MapView, Home, Search, ScaleBar, Sketch, Measurement, LayerList, GraphicsLayer
    ) {

      // Graphics layer for sketching
      const graphicsLayer = new GraphicsLayer();

      // Map with nice basemap
      const map = new Map({
        basemap: "hybrid",
        layers: [graphicsLayer]
      });

      // View centered on Burlington/Hamilton
      const view = new MapView({
        container: "viewDiv",
        map: map,
        center: [-79.8, 43.3],
        zoom: 12
      });

      // HOME widget
      const home = new Home({ view: view });
      view.ui.add(home, "top-left");

      // SEARCH widget
      const search = new Search({ view: view });
      view.ui.add(search, "top-right");

      // SCALE BAR
      const scaleBar = new ScaleBar({
        view: view,
        unit: "metric"
      });
      view.ui.add(scaleBar, "bottom-left");

      // SKETCH widget
      const sketch = new Sketch({
        view: view,
        layer: graphicsLayer
      });
      view.ui.add(sketch, "top-right");

      // MEASUREMENT widget
      const measurement = new Measurement({
        view: view
      });
      view.ui.add(measurement, "bottom-right");

      // LAYER LIST (extra polish)
      const layerList = new LayerList({
        view: view
      });
      view.ui.add(layerList, "bottom-left");

    });
  </script>
</head>

<body>

  <!-- Title box -->
  <div id="titleDiv">
    <h2>Urban Planning Web Map</h2>
    <p>Burlington & Hamilton Area — Sketch, Measure, Explore</p>
  </div>

  <!-- Map container -->
  <div id="viewDiv"></div>

</body>
</html>
